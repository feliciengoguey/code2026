<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ada</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f5f5f5;
      font-family: sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .images {
      display: flex;
      gap: 16px;
    }

    .images img {
      width: 296px;
      height: 128px;
      object-fit: cover;
      background-color: #ccc;
      display: block;
      border: 1px solid #ddd;
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .controls input[type="text"] {
      padding: 8px 12px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      width: 220px;
      outline: none;
      transition: border-color 0.2s;
    }

    .controls input[type="text"]:focus {
      border-color: #888;
    }

    .controls button {
      padding: 8px 18px;
      font-size: 14px;
      background-color: #333;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .controls button:hover {
      background-color: #555;
    }

    .controls button:active {
      background-color: #111;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="images">
      <img src="images/1/1.png" alt="Image 1">
      <img src="images/1/2.png" alt="Image 2">
    </div>
    <div class="controls">
      <input type="text" maxlength="30" placeholder="Enter text…">
      <button onclick="void(0)">Verify</button>
    </div>
  </div>
</body>
</html>
