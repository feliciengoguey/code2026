<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3x3 Image Grid</title>
<style>
  html, body {
    height: 100%;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f2f2f2;
    font-family: sans-serif;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    grid-template-rows: repeat(3, 100px);
    gap: 5px;
  }

  .grid img {
    width: 100px;
    height: 100px;
    object-fit: cover;
    cursor: pointer;
    transition: opacity 0.6s ease;
  }

  .grid img.faded {
    opacity: 0;
    pointer-events: none;
  }
</style>
</head>
<body>

  <div class="grid">
    <img src="images/1/1.jpg" alt="Image 1">
    <img src="images/1/2.jpg" alt="Image 2">
    <img src="images/1/3.jpg" alt="Image 3">
    <img src="images/1/4.jpg" alt="Image 4">
    <img src="images/1/5.jpg" alt="Image 5">
    <img src="images/1/6.jpg" alt="Image 6">
    <img src="images/1/7.jpg" alt="Image 7">
    <img src="images/1/8.jpg" alt="Image 8">
    <img src="images/1/9.jpg" alt="Image 9">
  </div>

  <script>
    const images = document.querySelectorAll('.grid img');

    images.forEach(img => {
      img.addEventListener('click', () => {
        img.classList.add('faded');
      });
    });
  </script>

</body>
</html>
